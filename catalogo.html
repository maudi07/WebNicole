<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de cuentas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="catalogo">
  <header class="topbar">
    <a class="logo" href="index.html">LunaConta</a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <nav class="menu" id="menu">
      <a href="index.html" data-link="inicio">Inicio</a>
      <a href="catalogo.html" data-link="catalogo">Catálogo</a>
      <a href="transacciones.html" data-link="transacciones">Asientos</a>
      <a href="diario.html" data-link="diario">Libro diario</a>
      <a href="mayor.html" data-link="mayor">Libro mayor</a>
      <a href="balanza.html" data-link="balanza">Balanza</a>
      <a href="balance.html" data-link="balance">Balance general</a>
      <a href="estados.html" data-link="estados">Resultado integral</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-head">
      <div>
        <p class="tag">Catálogo</p>
        <h1>Cuentas contables</h1>
        <p>Agrega cuentas con código, tipo, subtipo y naturaleza.</p>
      </div>
      <button class="btn danger" id="btnReiniciarCatalogo">Reiniciar datos</button>
    </section>

    <section class="card">
      <h2>Nueva cuenta</h2>
      <form id="formCuenta" class="form-grid">
        <label>
          Código
          <input type="text" id="codigoCuenta" placeholder="Ejemplo: 1006" required>
        </label>
        <label>
          Nombre
          <input type="text" id="nombreCuenta" placeholder="Ejemplo: Papelería" required>
        </label>
        <label>
          Tipo
          <select id="tipoCuenta" required>
            <option value="Activo">Activo</option>
            <option value="Pasivo">Pasivo</option>
            <option value="Capital">Capital</option>
            <option value="Ingreso">Ingreso</option>
            <option value="Gasto">Gasto</option>
          </select>
        </label>
        <label>
          Subtipo
          <select id="subtipoCuenta">
            <option value="">Sin subtipo</option>
            <option value="Otros ingresos">Otros ingresos</option>
            <option value="Gastos de venta">Gastos de venta</option>
            <option value="Gastos de administración">Gastos de administración</option>
            <option value="Otros gastos">Otros gastos</option>
          </select>
        </label>
        <label>
          Naturaleza
          <select id="naturalezaCuenta" required>
            <option value="Deudora">Deudora</option>
            <option value="Acreedora">Acreedora</option>
          </select>
        </label>
        <button class="btn primary" type="submit">Agregar cuenta</button>
      </form>
      <p id="mensajeCuenta" class="mensaje"></p>
    </section>

    <section class="card">
      <div class="section-title">
        <div>
          <p class="tag">Listado</p>
          <h2>Cuentas registradas</h2>
        </div>
        <input class="search" type="search" id="buscarCuenta" placeholder="Buscar cuenta...">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombre</th>
              <th>Tipo</th>
              <th>Subtipo</th>
              <th>Naturaleza</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaCatalogo"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="shared.js"></script>
</body>
</html>
