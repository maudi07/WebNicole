<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balanza de comprobación</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="balanza">
  <header class="topbar">
    <a class="logo" href="index.html">LunaConta</a>
    <button class="menu-btn" id="menuBtn">☰</button>
    <nav class="menu" id="menu">
      <a href="index.html" data-link="inicio">Inicio</a>
      <a href="catalogo.html" data-link="catalogo">Catálogo</a>
      <a href="transacciones.html" data-link="transacciones">Asientos</a>
      <a href="diario.html" data-link="diario">Libro diario</a>
      <a href="mayor.html" data-link="mayor">Libro mayor</a>
      <a href="balanza.html" data-link="balanza">Balanza</a>
      <a href="balance.html" data-link="balance">Balance general</a>
      <a href="estados.html" data-link="estados">Resultado integral</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-head">
      <div>
        <p class="tag">Comprobación</p>
        <h1>Balanza de comprobación</h1>
        <p>Debe, haber, saldo deudor y saldo acreedor por cuenta.</p>
      </div>
      <button class="btn secondary" onclick="generarPDF('balanza')">Generar PDF</button>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Cuenta</th>
              <th>Debe</th>
              <th>Haber</th>
              <th>Saldo deudor</th>
              <th>Saldo acreedor</th>
            </tr>
          </thead>
          <tbody id="tablaBalanza"></tbody>
          <tfoot>
            <tr>
              <th colspan="2">Totales</th>
              <th id="balanzaDebe">$0.00</th>
              <th id="balanzaHaber">$0.00</th>
              <th id="balanzaSaldoDeudor">$0.00</th>
              <th id="balanzaSaldoAcreedor">$0.00</th>
            </tr>
          </tfoot>
        </table>
      </div>
      <p id="mensajeBalanza" class="mensaje"></p>
    </section>
  </main>

  <script src="shared.js"></script>
</body>
</html>
